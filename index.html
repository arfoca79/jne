<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JNE – Expediente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 30px 16px; }
    .card {
      background: white; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px 36px; max-width: 700px; margin: 0 auto;
    }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
    .badge { background: #c0392b; color: white; font-weight: 700; font-size: 15px; padding: 8px 12px; border-radius: 6px; }
    .header-text h1 { font-size: 16px; color: #333; }
    .header-text p { font-size: 13px; color: #888; }
    .exp-titulo { font-size: 22px; font-weight: 700; color: #c0392b; margin-bottom: 4px; }
    .estado-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px; background: #e8f8f0; color: #27ae60; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .campo label { font-size: 11px; text-transform: uppercase; color: #aaa; font-weight: 600; letter-spacing: 0.5px; }
    .campo p { font-size: 14px; color: #333; font-weight: 500; margin-top: 3px; }
    .seccion-titulo { font-size: 13px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 10px; border-top: 1px solid #eee; padding-top: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8f8f8; padding: 8px 10px; text-align: left; color: #777; font-weight: 600; font-size: 11px; text-transform: uppercase; }
    td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; color: #444; }
    tr:last-child td { border-bottom: none; }
    .spinner-wrap { text-align: center; padding: 40px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #f0f2f5; border-top: 3px solid #c0392b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-jne { display: inline-block; margin-top: 20px; background: #c0392b; color: white; border-radius: 8px; padding: 11px 22px; font-size: 14px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; }
    .btn-jne:hover { background: #a93226; }
    pre { background: #f8f8f8; padding: 12px; border-radius: 8px; font-size: 11px; overflow-x: auto; max-height: 300px; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <div class="badge">JNE</div>
    <div class="header-text">
      <h1>Plataforma Histórica</h1>
      <p>Búsqueda de Expedientes</p>
    </div>
  </div>
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <p style="color:#888;font-size:14px">Cargando expediente...</p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const exp = params.get('exp');

if (!exp) {
  document.getElementById('card').innerHTML += `<p style="color:#888;text-align:center;padding:20px">No se especificó número de expediente. Usa ?exp=000634</p>`;
} else {
  const codigo = 'SEPEG.2026' + exp.padStart(6, '0');
  cargarExpediente(codigo);
}

async function cargarExpediente(codigo) {
  const targetUrl = 'https://plataformahistorico.jne.gob.pe/Expediente/BuscandoCodigo';
  const proxyUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(targetUrl);

  try {
    const res = await fetch(proxyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ strNumExpedienteFiltro: codigo })
    });

    if (!res.ok) throw new Error('Error HTTP ' + res.status);
    const data = await res.json();
    mostrar(codigo, data);

  } catch (e) {
    document.getElementById('card').innerHTML = `
      <div class="header">
        <div class="badge">JNE</div>
        <div class="header-text"><h1>Plataforma Histórica</h1><p>Búsqueda de Expedientes</p></div>
      </div>
      <div style="text-align:center;padding:30px 0">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div class="exp-titulo">${codigo}</div>
        <p style="color:#888;font-size:14px;margin:12px 0 20px">No se pudo cargar automáticamente (${e.message}).<br>Búscalo manualmente en la plataforma JNE:</p>
        <a class="btn-jne" href="https://plataformahistorico.jne.gob.pe/Expediente/BusquedaExpediente" target="_blank">Ir a la plataforma JNE →</a>
        <p style="font-size:11px;color:#bbb;margin-top:16px">Código: <strong style="color:#c0392b">${codigo}</strong></p>
      </div>
    `;
  }
}

function mostrar(codigo, data) {
  const root = data.data || data;
  // El expediente principal: si lAsociadosHijos tiene 1 elemento que coincide con el código buscado, usarlo
  const hijos = root.lAsociadosHijos || [];
  let principal = root;
  const match = hijos.find(h => h.strCodExpedienteExt === codigo);
  if (match) principal = match;
  else if (!root.strCodExpedienteExt && hijos.length === 1) principal = hijos[0];

  const fmtFecha = (f) => {
    if (!f) return '-';
    const d = new Date(f);
    if (isNaN(d)) return f.toString().substring(0,10);
    return d.toLocaleDateString('es-PE');
  };

  let hijosHTML = '';
  if (hijos.length) {
    hijosHTML = `<div class="seccion-titulo">Expedientes Asociados (${hijos.length})</div>
    <table><thead><tr><th>Código</th><th>Tipo</th><th>Materia</th><th>Estado</th><th>Etapa</th><th>JEE</th></tr></thead><tbody>`;
    hijos.forEach(h => {
      hijosHTML += `<tr>
        <td><strong>${h.strCodExpedienteExt||'-'}</strong></td>
        <td>${h.strTipoExpediente||'-'}</td>
        <td>${h.strMateria||'-'}</td>
        <td>${h.strEstado||'-'}</td>
        <td>${h.strEtapa||'-'}</td>
        <td>${h.strJuradoCompetencia||'-'}</td>
      </tr>`;
    });
    hijosHTML += '</tbody></table>';
  }

  document.getElementById('card').innerHTML = `
    <div class="header">
      <div class="badge">JNE</div>
      <div class="header-text"><h1>Plataforma Histórica</h1><p>Búsqueda de Expedientes</p></div>
    </div>
    <div class="exp-titulo">${codigo}</div>
    <span class="estado-badge">${principal.strEstado || 'Sin estado'}</span>
    <div class="grid">
      <div class="campo"><label>Tipo de Expediente</label><p>${principal.strTipoExpediente||'-'}</p></div>
      <div class="campo"><label>Materia</label><p>${principal.strMateria||'-'}</p></div>
      <div class="campo"><label>Etapa</label><p>${principal.strEtapa||'-'}</p></div>
      <div class="campo"><label>Estado</label><p>${principal.strEstado||'-'}</p></div>
      <div class="campo"><label>Jurado Competencia</label><p>${principal.strJuradoCompetencia||'-'}</p></div>
      <div class="campo"><label>Jurado Creación</label><p>${principal.strJuradoCreacion||'-'}</p></div>
    </div>
    ${hijosHTML}
    <div class="seccion-titulo">Datos completos (debug)</div>
    <pre>${JSON.stringify(data, null, 2)}</pre>
    <div style="margin-top:20px;text-align:right">
      <a class="btn-jne" href="https://plataformahistorico.jne.gob.pe/Expediente/BusquedaExpediente" target="_blank">Ver en plataforma JNE →</a>
    </div>
  `;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JNE – Expediente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 36px 40px;
      width: 420px;
      max-width: 95vw;
      text-align: center;
    }
    .logo-badge {
      background: #c0392b;
      color: white;
      font-weight: 700;
      font-size: 16px;
      padding: 8px 14px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    h1 { font-size: 17px; color: #1a1a2e; margin-bottom: 8px; }
    .codigo {
      font-size: 22px;
      font-weight: 700;
      color: #c0392b;
      background: #fdf0ef;
      border-radius: 8px;
      padding: 12px 20px;
      display: inline-block;
      margin: 16px 0;
      letter-spacing: 2px;
    }
    .msg { font-size: 14px; color: #666; margin-bottom: 6px; }
    .submsg { font-size: 12px; color: #aaa; margin-top: 16px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #f0f2f5;
      border-top: 3px solid #c0392b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button {
      margin-top: 20px;
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #a93226; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo-badge">JNE</div>
  <h1>Abriendo expediente...</h1>
  <div class="spinner"></div>
  <p class="submsg">Serás redirigido a la Plataforma Electoral del JNE</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const exp = params.get('exp');

  if (exp) {
    const codigo = 'SEPEG.2026' + exp.padStart(6, '0');
    document.querySelector('h1').textContent = 'Abriendo expediente...';

    // Mostrar el código
    const div = document.createElement('div');
    div.className = 'codigo';
    div.textContent = codigo;
    document.querySelector('.spinner').before(div);

    // Copiar al portapapeles y abrir la plataforma
    setTimeout(() => {
      navigator.clipboard.writeText(codigo).catch(() => {});
      window.location.href = 'https://plataformahistorico.jne.gob.pe/Expediente/BusquedaExpediente';
    }, 800);

  } else {
    // Sin parámetro: mostrar formulario manual
    const card = document.getElementById('card');
    card.innerHTML = `
      <div class="logo-badge">JNE</div>
      <h1>Buscar Expediente</h1>
      <p class="msg" style="margin-top:12px">Ingresa el número de expediente</p>
      <div style="display:flex;gap:8px;margin-top:16px">
        <div style="background:#f0f2f5;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:13px;color:#666;white-space:nowrap;display:flex;align-items:center">SEPEG.2026</div>
        <input id="num" type="text" placeholder="000634" maxlength="6" inputmode="numeric"
          style="flex:1;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:16px;font-weight:700;letter-spacing:1px;outline:none">
      </div>
      <button onclick="ir()">Ir al expediente →</button>
    `;
    document.getElementById('num').addEventListener('keydown', e => { if(e.key==='Enter') ir(); });
  }

  function ir() {
    const num = document.getElementById('num').value.trim();
    if (!num || !/^\d+$/.test(num)) return;
    window.location.href = '?exp=' + num.padStart(6,'0');
  }
</script>
</body>
</html>
